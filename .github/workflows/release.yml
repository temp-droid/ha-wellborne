name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[test]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=custom_components/wellborne --cov-fail-under=80

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify manifest version
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/wellborne/manifest.json'))['version'])")
          TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: manifest.json ($MANIFEST_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create release archive
        run: |
          cd custom_components
          zip -r ../wellborne.zip wellborne

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wellborne.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
